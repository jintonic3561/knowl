services:
  knowl:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: knowl
    restart: unless-stopped
    environment:
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN:-}"
      SLACK_APP_TOKEN: "${SLACK_APP_TOKEN:-}"
      SLACK_CHANNEL: "${SLACK_CHANNEL:-}"
      GH_TOKEN: "${GH_TOKEN:-}"
      KNOWL_CONFIG: /etc/knowl/config.yaml
      KNOWL_CREDENTIALS: /root/.claude/.credentials.json
      # truthy なら entrypoint の初回即時実行を skip。`make deploy` から渡す想定。
      KNOWL_SKIP_INITIAL_RUN: "${KNOWL_SKIP_INITIAL_RUN:-}"
    volumes:
      # Knowl 設定 (必須)
      - ../knowl.yaml:/etc/knowl/config.yaml:ro
      # Claude Code OAuth credentials (必須)
      # ファイル単位だと atomic rename での更新を検知できないためディレクトリ単位でマウント
      - ${HOME}/.claude:/root/.claude:ro
      # 対象リポジトリのコンテナを起動・exec するため docker.sock をマウント
      - /var/run/docker.sock:/var/run/docker.sock
      # gh CLI 認証情報 (任意)
      - ${HOME}/.config/gh:/root/.config/gh:ro
      # knowl 自身の PR が auto-merge された後、稼働中コンテナへ変更を伝播させる bind mount。
      # Dockerfile 側で uv が editable install (.pth → /opt/knowl/src) しているので、
      # host 側で main を pull した瞬間から次サイクル以降は新コードで走る。
      # 依存追加・entry-point 追加など .venv 再生成が必要な変更は引き続き `make deploy` で rebuild。
      - ../src:/opt/knowl/src:ro
      # templates は config.yaml の親ディレクトリ基準で resolve されるため、
      # config (/etc/knowl/config.yaml) と同じディレクトリ配下にマウントする。
      - ../templates:/etc/knowl/templates:ro
      # idle 連続抑止用の状態ファイル。コンテナ再起動 / `make deploy` を跨いでも
      # 残るよう named volume を割り当てる (なくすと毎再起動で idle 通知が 1 回飛ぶ)。
      - knowl-state:/var/lib/knowl

volumes:
  knowl-state:
