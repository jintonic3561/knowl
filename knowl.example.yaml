# Knowl 設定例 (cp して knowl.yaml にし、compose で /etc/knowl/config.yaml にマウント)
model: claude-opus-4-7
cron_interval_minutes: 60

thresholds:
  session_remaining_pct: 30   # 5h ローリング枠の最低残量(%)
  weekly_remaining_pct: 10    # 週次枠の最低残量(%)

slack:
  channel: "#knowl"            # SLACK_CHANNEL 環境変数で上書き可

templates:
  implementation: templates/implementation.md
  investigation: templates/investigation.md

# 対象リポジトリの container 側で claude / gh が認証済であることが前提
# (Knowl 側からは credentials を中継しない)。
repositories:
  - name: your-org/your-repo
    container:
      kind: docker            # docker | devcontainer
      name: your-repo-dev
      workdir: /workspace
      # user: vscode          # docker exec --user に渡す。devcontainer の remoteUser
      #                       # (vscode / node / ubuntu 等) に claude をインストール
      #                       # している場合は指定する。指定時は bash -lc 経由で起動し、
      #                       # 対象 user の .bashrc / .profile で PATH が拾われる。
      # exec_prefix: ["direnv", "exec", "."]
      #                       # argv の前に prepend する任意のラッパ。docker exec は非対話
      #                       # 実行のためシェル hook 型 (direnv 等) は発火しない。明示的な
      #                       # exec ラッパで .envrc 等から GH_TOKEN を流す用途。
      #                       # argv 透過型なら他にも使える: ["mise", "exec", "--"] 等。
      #                       # 単一シェル文字列を要求する `nix-shell --run "<cmd>"` 型は不可。
